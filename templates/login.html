{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block extra_css %}
<style>

.login-page{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:75vh;
}

.login-box{
    width:100%;
    max-width:430px;
    background:#fff;
    border-radius:20px;
    padding:45px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
    border:1px solid #edf2f7;
}

.login-logo{
    width:70px;
    height:70px;
    margin:0 auto 20px;
    border-radius:18px;
    background:#16a34a;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
}

.login-title{
    text-align:center;
    margin-bottom:10px;
    font-size:30px;
    font-weight:700;
    color:#0f172a;
}

.login-subtitle{
    text-align:center;
    color:#64748b;
    margin-bottom:35px;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

.input-box{
    position:relative;
}

.input-box input{
    width:100%;
    padding:14px 16px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    outline:none;
    font-size:15px;
    transition:.3s;
    background:#fafafa;
}

.input-box input:focus{
    border-color:#16a34a;
    background:#fff;
    box-shadow:0 0 0 4px rgba(22,163,74,.10);
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#16a34a;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#15803d;
    transform:translateY(-2px);
}

.error-box{
    background:#fef2f2;
    color:#dc2626;
    padding:14px;
    border-radius:12px;
    margin-bottom:20px;
    font-size:14px;
    text-align:center;
}

.footer-text{
    margin-top:25px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
}

@media(max-width:600px){

.login-box{
    padding:30px 25px;
}

.login-title{
    font-size:25px;
}

}

</style>
{% endblock %}

{% block content %}

<div class="login-page">

    <div class="login-box">

        <div class="login-logo">
            🍽️
        </div>

        <h2 class="login-title">
            Kitchen Login
        </h2>

        <p class="login-subtitle">
            Sign in to continue to your dashboard
        </p>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>

                <div class="input-box">
                    <input
                        type="text"
                        name="username"
                        placeholder="Enter your username"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>

                <div class="input-box">
                    <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                    >
                </div>
            </div>

            <button class="login-btn" type="submit">
                Login
            </button>

        </form>

        <div class="footer-text">
            © 2026 Kitchen Management System
        </div>

    </div>

</div>

{% endblock %}
