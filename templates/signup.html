{% extends 'base.html' %}

{% block title %}Sign Up{% endblock %}

{% block extra_css %}

<style>

.signup-wrapper{
    min-height:600px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.signup-box{
    width:100%;
    max-width:520px;
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(15,23,42,.08);
}

.signup-logo{
    width:80px;
    height:80px;
    margin:auto;
    border-radius:20px;
    background:#16a34a;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    color:#fff;
}

.signup-title{
    margin-top:22px;
    text-align:center;
    font-size:30px;
    font-weight:700;
    color:#0f172a;
}

.signup-subtitle{
    margin-top:8px;
    text-align:center;
    color:#64748b;
    margin-bottom:35px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
    color:#334155;
}

.form-control{
    width:100%;
    height:52px;
    border:1px solid #cbd5e1;
    border-radius:12px;
    padding:0 16px;
    font-size:15px;
    transition:.3s;
    outline:none;
}

.form-control:focus{
    border-color:#16a34a;
    box-shadow:0 0 0 4px rgba(22,163,74,.15);
}

.signup-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:12px;
    background:#16a34a;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    margin-top:10px;
}

.signup-btn:hover{
    background:#15803d;
    transform:translateY(-2px);
}

.error-box{
    background:#fee2e2;
    color:#b91c1c;
    border:1px solid #fecaca;
    padding:14px;
    border-radius:10px;
    margin-bottom:20px;
    text-align:center;
}

.login-link{
    margin-top:28px;
    text-align:center;
    color:#64748b;
}

.login-link a{
    color:#16a34a;
    font-weight:600;
}

.login-link a:hover{
    text-decoration:underline;
}

@media(max-width:600px){

    .signup-box{
        padding:28px;
    }

    .signup-title{
        font-size:26px;
    }

}

</style>

{% endblock %}


{% block content %}

<div class="signup-wrapper">

    <div class="signup-box">

        <div class="signup-logo">
            🍽️
        </div>

        <h2 class="signup-title">
            Create Account
        </h2>

        <p class="signup-subtitle">
            Register to access the Kitchen Management System
        </p>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>First Name</label>
                <input
                    class="form-control"
                    type="text"
                    name="first_name"
                    placeholder="Enter your first name"
                    required
                >
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input
                    class="form-control"
                    type="text"
                    name="last_name"
                    placeholder="Enter your last name"
                    required
                >
            </div>

            <div class="form-group">
                <label>Username</label>
                <input
                    class="form-control"
                    type="text"
                    name="username"
                    placeholder="Choose a username"
                    required
                >
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                    class="form-control"
                    type="password"
                    name="password"
                    placeholder="Create a password"
                    required
                >
            </div>

            <button class="signup-btn" type="submit">
                Create Account
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="{% url 'login' %}">
                Login
            </a>
        </div>

    </div>

</div>

{% endblock %}
